<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHE — Access</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #060810;
    --bg2:      #0c0f1a;
    --bg3:      #111520;
    --bg4:      #171c2a;
    --border:   #1f2740;
    --border2:  #2a3450;
    --accent:   #00e5ff;
    --accent2:  #7c4dff;
    --accent3:  #ff4d6d;
    --green:    #00e676;
    --text:     #b0bcd4;
    --text-dim: #44536e;
    --text-hi:  #e8edf8;
    --mono:     'IBM Plex Mono', monospace;
    --display:  'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Corner accent lines */
  .corner {
    position: fixed;
    width: 120px;
    height: 120px;
    pointer-events: none;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 1px solid rgba(0,229,255,0.2); border-left: 1px solid rgba(0,229,255,0.2); }
  .corner-tr { top: 24px; right: 24px; border-top: 1px solid rgba(0,229,255,0.2); border-right: 1px solid rgba(0,229,255,0.2); }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid rgba(0,229,255,0.2); border-left: 1px solid rgba(0,229,255,0.2); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid rgba(0,229,255,0.2); border-right: 1px solid rgba(0,229,255,0.2); }

  .scan-line {
    position: fixed;
    top: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.6), transparent);
    animation: scan 4s linear infinite;
    pointer-events: none;
  }

  @keyframes scan {
    0%   { top: -2px; opacity: 1; }
    90%  { opacity: 0.8; }
    100% { top: 100vh; opacity: 0; }
  }

  .wrap {
    width: 100%;
    max-width: 400px;
    padding: 0 20px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-block {
    margin-bottom: 36px;
    text-align: center;
  }

  .logo {
    font-family: var(--display);
    font-weight: 700;
    font-size: 52px;
    letter-spacing: 0.25em;
    color: var(--text-hi);
    line-height: 1;
    position: relative;
    display: inline-block;
  }

  .logo::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo-sub {
    margin-top: 10px;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.04) inset;
  }

  /* Tabs */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    background: none;
    border: none;
    padding: 14px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0,229,255,0.03); }

  .form-wrap { padding: 32px 28px; }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-hi);
    padding: 11px 14px;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }

  .field input::placeholder { color: var(--text-dim); }

  .submit-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
    z-index: 0;
  }

  .submit-btn:hover::before { transform: scaleX(1); }
  .submit-btn:hover { color: var(--bg); }
  .submit-btn span { position: relative; z-index: 1; }

  .error-msg {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.25);
    border-radius: 2px;
    color: var(--accent3);
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  .hint {
    margin-top: 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  .hint a { color: var(--accent2); text-decoration: none; }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="scan-line"></div>

<div class="wrap">
  <div class="logo-block">
    <div class="logo">PSYCHE</div>
    <div class="logo-sub">personality engine</div>
  </div>

  <div class="box">
    <div class="tabs">
      <button class="tab-btn {% if tab == 'login' or not tab %}active{% endif %}" onclick="switchTab('login', this)">Sign In</button>
      <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="switchTab('register', this)">Register</button>
    </div>

    <div class="form-wrap">
      <!-- LOGIN -->
      <div class="tab-panel {% if tab == 'login' or not tab %}active{% endif %}" id="panel-login">
        <form method="POST">
          <input type="hidden" name="action" value="login">
          <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="your handle" autocomplete="username" autofocus>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button type="submit" class="submit-btn"><span>Enter System</span></button>
          {% if error and (tab == 'login' or not tab) %}
          <div class="error-msg">// {{ error }}</div>
          {% endif %}
        </form>
      </div>

      <!-- REGISTER -->
      <div class="tab-panel {% if tab == 'register' %}active{% endif %}" id="panel-register">
        <form method="POST">
          <input type="hidden" name="action" value="register">
          <div class="field">
            <label>Username</label>
            <input type="text" name="username" placeholder="pick a handle" autocomplete="username">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" autocomplete="new-password">
          </div>
          <button type="submit" class="submit-btn"><span>Create Account</span></button>
          {% if error and tab == 'register' %}
          <div class="error-msg">// {{ error }}</div>
          {% endif %}
        </form>
      </div>
    </div>
  </div>

  <div class="hint">
    share this with your group — everyone needs an account<br>
    discord: <a href="#">vulgnox</a>
  </div>
</div>

<script>
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
  // update hidden input in active form
  document.querySelector('#panel-' + id + ' input[name=action]').value = id;
}
</script>
</body>
</html>
